name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # Setup SSH directory
          mkdir -p ~/.ssh

          # Write private key from secret
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add server to known hosts
          ssh-keyscan -H 54.234.51.90 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Deploy to server
          ssh -i ~/.ssh/deploy_key root@54.234.51.90 -t \
            "cd CICD-Demo/ && \
             git pull origin main && \
             export PATH=/root/.nvm/versions/node/v22.13.1/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin && \
             npm install -g pnpm && \
             pnpm install && \
             pnpm run build && \
             pm2 restart fe-sever && \
             pm2 restart http-sever && \
             pm2 restart ws-sever"
